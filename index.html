<!DOCTYPE html>
<html lang="nl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Ommen Nieuws</title>

    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="icon-192x192.png" type="image/png">

</head>


<body>


<header>

    <h1>📰 Ommen Nieuws</h1>
    <div class="search-row">

    <input
        type="text"
        id="search-input"
        placeholder="Zoek in nieuws...">

</div>


<label class="switch-label">

    <span>Regio</span>

    <input
        type="checkbox"
        id="only-ommen"
        checked>

    <span class="slider"></span>

    <span>Gemeente</span>

</label>

    <button id="source-button">
    Bronnen ▼
</button>

<div id="source-menu" class="source-menu" style="display:none;">

    <label>
        <input type="checkbox" class="source-filter" value="Ommen City" checked>
        Ommen City
    </label><br>

    <label>
        <input type="checkbox" class="source-filter" value="OudOmmen" checked>
        OudOmmen
    </label><br>

    <label>
        <input type="checkbox" class="source-filter" value="De Stentor" checked>
        De Stentor
    </label><br>

    <label>
        <input type="checkbox" class="source-filter" value="Gemeente Ommen" checked>
        Gemeente Ommen
    </label>

</div>

</header>



<main>

    <div id="news-container">

        Bezig met laden...

    </div>

</main>



<footer>

    <button onclick="refreshNews()">

        🔄 Vernieuwen

    </button>

</footer>



<script src="script.js"></script>


</body>

</html>
